seed: 42

data:
  raw_csv: data/raw/efp/EFP_long.csv
  processed_dir: data/processed/efp
  batch_id_col: batch_id
  time_col: hh
  derived_time_col: elapsed_hours
  rebase_time_by_batch: true
  target_col: cer
  feature_cols: []
  diff_feature_cols: []
  horizon_hours: 48
  max_seq_len: 192
  test_size: 0.15
  val_size: 0.15

model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  ff_dim: 256
  dropout: 0.1
  num_datasets: 1

training:
  batch_size: 32
  epochs: 60
  learning_rate: 0.0003
  weight_decay: 0.01
  grad_clip_norm: 1.0
  early_stopping_patience: 10
  mixed_precision: true

output:
  dir: outputs/transformer_small
