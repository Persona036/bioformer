seed: 42

data:
  raw_csv: data/raw/efp/EFP_long.csv
  processed_dir: data/processed/efp
  batch_id_col: batch_id
  time_col: hh
  derived_time_col: elapsed_hours
  rebase_time_by_batch: true
  target_col: cer
  feature_cols: []
  diff_feature_cols: []
  stratify_splits: true
  stratify_bins: 10
  stratify_tail_quantile: 0.98
  horizon_hours: 48
  max_seq_len: 192
  test_size: 0.15
  val_size: 0.15

model:
  name: ridge
  summary_stats:
    - mean
    - std
    - min
    - max
    - last
  ridge_alpha: 1.0
  elasticnet_alpha: 0.05
  elasticnet_l1_ratio: 0.5
  xgboost_params:
    n_estimators: 400
    max_depth: 4
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_alpha: 0.0
    reg_lambda: 1.0
    objective: reg:squarederror
    random_state: 42

output:
  dir: outputs/baseline
